---
# llmkube-bootstrap top-level playbook.
#
# Runs against localhost only. Tags are how the entrypoint (bootstrap.sh)
# composes "what to install":
#
#   tags: always   -- always run (preflight, sanity asserts)
#   tags: base     -- the standard install everyone gets
#   tags: foreman  -- opt-in: agentic-workload add-on
#   tags: carnice  -- opt-in: pull the 35 GB Carnice GGUF
#
# Re-runnable. Each role's tasks short-circuit when their desired
# state already holds.

- name: Bootstrap a MacBook Pro for LLMKube local inference
  hosts: localhost
  connection: local
  gather_facts: true

  pre_tasks:
    - name: Assert macOS host
      ansible.builtin.assert:
        that:
          - ansible_facts['os_family'] == 'Darwin'
        fail_msg: "llmkube-bootstrap targets macOS only; ran on {{ ansible_facts['os_family'] }}."
      tags: [always]

    - name: Assert macOS Sequoia (15.x) or later
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution_major_version'] | int >= 15
        fail_msg: >-
          llmkube-bootstrap requires macOS 15 (Sequoia) or later;
          this Mac is on {{ ansible_facts['distribution_version'] }}.
      tags: [always]

    - name: Assert Apple Silicon
      ansible.builtin.assert:
        that:
          - ansible_facts['architecture'] == 'arm64'
        fail_msg: >-
          llmkube-bootstrap targets Apple Silicon; this Mac reports
          architecture={{ ansible_facts['architecture'] }}.
      tags: [always]

  roles:
    # Base path -- everyone gets these in order. Each role also
    # gets a tag of its own name so CI can run a subset cleanly
    # (e.g. --tags system,homebrew for the macOS install test).
    - role: system
      tags: [base, system]
    - role: homebrew
      tags: [base, homebrew]
    - role: kubernetes
      tags: [base, kubernetes]
    - role: llmkube_core
      tags: [base, llmkube_core]
    - role: model_starter
      tags: [base, model_starter]
    - role: developer_tools
      tags: [base, developer_tools]
    - role: opencode
      tags: [base, opencode]

    # Opt-in -- only when --tags includes the matching tag.
    - role: carnice
      tags: [carnice, never]
    - role: foreman
      tags: [foreman, never]
