---
# Default package set. Each list is intentionally small + opinionated.
# Override in group_vars/all.yml or via --extra-vars to extend.

homebrew_cli_packages:
  # Kubernetes runtime + tooling
  - kubectl
  - kind
  - helm
  - k9s
  - kustomize

  # Docker via colima. colima boots a user-space Lima VM and exposes
  # a Docker socket; the docker / docker-compose / docker-buildx CLIs
  # talk to that socket. No /usr/local writes, no sudo dance, smaller
  # resident footprint than Docker Desktop. To use Docker Desktop
  # instead, add `docker` to `homebrew_casks` in your group_vars and
  # be ready to run sudo for /usr/local/* directory creation -- see
  # README "Docker Desktop on Apple Silicon" callout.
  - colima
  - docker
  - docker-compose
  - docker-buildx

  # llama.cpp for Metal-accelerated inference (metal-agent shells to it)
  - llama.cpp

  # Developer ergonomics
  - git
  - gh
  - jq
  - yq
  - fzf
  - ripgrep
  - tmux

  # Build + automation prereqs LLMKube core's Makefile needs
  - go
  - make

# Default casks: empty. The previous default included Docker Desktop,
# but its postinstall hook sudo-writes to multiple /usr/local/*
# paths that do not exist on a fresh Apple Silicon Mac, and brew
# runs under `become: false` so the sudo prompts have no TTY. We
# switched to colima (above) as the default Docker runtime. Add
# casks here in your group_vars when you want GUI apps.
homebrew_casks: []
