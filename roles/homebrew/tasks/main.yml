---
# homebrew role -- per-package installs via community.general.homebrew.
#
# Homebrew refuses to run as root on macOS, so every task here runs
# as the invoking user (become: false). bootstrap.sh already
# guarantees brew itself is installed; we only manage the package set
# here.

- name: Ensure Homebrew is up to date
  community.general.homebrew:
    update_homebrew: true
  become: false
  changed_when: false   # `brew update` always reports as changed; skip

- name: Install CLI packages
  community.general.homebrew:
    name: "{{ homebrew_cli_packages }}"
    state: present
  become: false

- name: Pre-create /usr/local/cli-plugins for the docker-desktop cask
  # Docker Desktop's cask postinstall hook writes CLI plugin symlinks
  # into /usr/local/cli-plugins (legacy Intel-Mac path retained on
  # Apple Silicon for cross-arch compat). On a fresh macOS install
  # that directory does not exist and /usr/local/ is root-owned, so
  # the cask's `sudo mkdir -p` step fails with 'a terminal is required
  # to read the password' because brew's internal sudo bypasses
  # Ansible's become and has no TTY.
  #
  # Pre-creating the directory under the invoking user removes the
  # sudo step from brew's cask path entirely. Only runs when the
  # cask list actually contains docker-desktop or its alias.
  become: true
  ansible.builtin.file:
    path: /usr/local/cli-plugins
    state: directory
    owner: "{{ ansible_facts['user_id'] }}"
    group: staff
    mode: '0755'
  when: >-
    homebrew_casks | select('match', '^docker(-desktop)?$') | list | length > 0

- name: Install Homebrew casks (GUI apps)
  community.general.homebrew_cask:
    name: "{{ homebrew_casks }}"
    state: present
    # accept_external_apps avoids spurious "already installed via a
    # different mechanism" failures when a user pre-installed Docker
    # Desktop manually.
    accept_external_apps: true
  become: false
  # community.general.homebrew_cask errors with "You must select a
  # cask to install" when handed an empty list. The default
  # homebrew_casks is now [] (colima replaces docker-desktop), so
  # skip the task entirely unless a user has opted into one or more
  # casks via group_vars / --extra-vars.
  when: homebrew_casks | length > 0
