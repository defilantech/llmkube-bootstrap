---
# llmkube_core role -- get the operator + metal-agent installed.
#
# Two phases:
#   1. Clone the LLMKube source repo to ~/src/LLMKube and helm-install
#      its operator chart into the local kind cluster.
#   2. Build the metal-agent binary from the same source clone and
#      install the launchd unit via the repo's `make install-metal-agent`.

# --- Phase 1: source + operator chart ------------------------------------

- name: Clone the LLMKube source repo into {{ src_dir }}
  ansible.builtin.git:
    repo: "{{ llmkube_repo_url }}"
    dest: "{{ src_dir }}/LLMKube"
    version: "{{ llmkube_repo_ref }}"
    update: true
    force: false  # never blow away local edits
  register: llmkube_clone

- name: Show LLMKube source HEAD
  ansible.builtin.command:
    cmd: git rev-parse --short HEAD
    chdir: "{{ src_dir }}/LLMKube"
  register: llmkube_head
  changed_when: false

- name: Create the LLMKube namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ llmkube_namespace }}"
    state: present

- name: Install / upgrade the LLMKube operator chart
  kubernetes.core.helm:
    name: llmkube
    chart_ref: "{{ llmkube_chart_path }}"
    release_namespace: "{{ llmkube_namespace }}"
    wait: true
    atomic: true
    create_namespace: false

- name: Wait for the LLMKube controller-manager Deployment to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ llmkube_namespace }}"
    name: llmkube-controller-manager
  register: llmkube_controller_mgr
  retries: 30
  delay: 5
  until: >-
    llmkube_controller_mgr.resources | length > 0
    and (llmkube_controller_mgr.resources[0].status.readyReplicas | default(0)) >= 1

# --- Phase 2: metal-agent ------------------------------------------------

- name: Build metal-agent binary
  # We deliberately do NOT call `make install-metal-agent` here. That
  # target runs `sudo cp bin/llmkube-metal-agent /usr/local/bin/...`
  # internally, and brew's sudo bypasses Ansible's BECOME plumbing
  # so there is no TTY for the password prompt. Instead: build the
  # binary with `make build-metal-agent`, then drive install +
  # launchd ourselves using Ansible's become.
  ansible.builtin.command:
    cmd: make build-metal-agent
    chdir: "{{ src_dir }}/LLMKube"
    creates: "{{ src_dir }}/LLMKube/bin/llmkube-metal-agent"
  environment:
    LLMKUBE_METAL_AGENT_MODEL_STORE: "{{ model_store }}"
    LLMKUBE_METAL_AGENT_MEMORY_FRACTION: "{{ metal_agent_memory_fraction }}"
    LLMKUBE_METAL_AGENT_LLAMA_SERVER_PORT: "{{ metal_agent_llama_server_port }}"
  register: build_metal_agent
  changed_when: build_metal_agent.rc == 0
  # Force a rebuild on every run so a `git pull` of the LLMKube
  # source picks up. `creates:` above only short-circuits when the
  # binary exists; combining with this no-op `failed_when:` keeps
  # the task idempotent in shape even when the binary is rebuilt.
  failed_when: build_metal_agent.rc != 0 and 'Nothing to be done' not in build_metal_agent.stdout

- name: Ensure /usr/local/bin exists
  # /usr/local/bin is root-owned on a fresh Apple Silicon Mac; create
  # it under become so the install step below can write into it.
  become: true
  ansible.builtin.file:
    path: /usr/local/bin
    state: directory
    mode: '0755'

- name: Install metal-agent binary to /usr/local/bin
  # Ansible's become uses the BECOME password collected by
  # bootstrap.sh's --ask-become-pass at run start. Equivalent to
  # the Makefile's `sudo cp` but driven through the channel that
  # actually has the password.
  become: true
  ansible.builtin.copy:
    src: "{{ src_dir }}/LLMKube/bin/llmkube-metal-agent"
    dest: /usr/local/bin/llmkube-metal-agent
    mode: '0755'
    remote_src: true
  register: install_metal_agent

- name: Ensure user LaunchAgents directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/Library/LaunchAgents"
    state: directory
    mode: '0755'

- name: Install metal-agent launchd plist
  ansible.builtin.copy:
    src: "{{ src_dir }}/LLMKube/deployment/macos/com.llmkube.metal-agent.plist"
    dest: "{{ ansible_facts['user_dir'] }}/Library/LaunchAgents/com.llmkube.metal-agent.plist"
    mode: '0644'
    remote_src: true
  register: install_metal_agent_plist

- name: Reload metal-agent launchd unit on binary or plist change
  ansible.builtin.shell: |
    launchctl bootout gui/$(id -u)/com.llmkube.metal-agent 2>/dev/null || true
    launchctl bootstrap gui/$(id -u) "{{ ansible_facts['user_dir'] }}/Library/LaunchAgents/com.llmkube.metal-agent.plist"
  when: install_metal_agent.changed or install_metal_agent_plist.changed
  changed_when: true

- name: Ensure the model-store dir exists
  ansible.builtin.file:
    path: "{{ model_store }}"
    state: directory
    mode: "0755"

- name: Confirm metal-agent is reachable on its health port
  ansible.builtin.uri:
    url: "http://127.0.0.1:9090/healthz"
    status_code: 200
    return_content: false
  register: metal_agent_health
  retries: 20
  delay: 3
  until: metal_agent_health.status == 200
