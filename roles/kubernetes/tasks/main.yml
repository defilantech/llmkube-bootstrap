---
# kubernetes role -- bring up the local cluster the operator runs on.
#
# Docker is provided by colima (user-space Lima VM), installed by the
# homebrew role. We make sure colima is running with enough resources
# for a kind cluster, then create the cluster + verify connectivity.
# Colima's daemon stays up across reboots once started; `colima start`
# is idempotent (no-ops when the VM is already up).

- name: Check colima status
  ansible.builtin.command: colima status
  register: colima_status
  changed_when: false
  failed_when: false

- name: Start colima with the configured VM size
  ansible.builtin.command: >-
    colima start
    --cpu {{ colima_cpu }}
    --memory {{ colima_memory_gib }}
    --disk {{ colima_disk_gib }}
  # colima writes the 'is it running?' line to stderr, hence the
  # stderr match below. rc != 0 covers the first-ever invocation
  # where the VM has not been created yet.
  when: colima_status.rc != 0 or 'Running' not in (colima_status.stderr | default(''))
  changed_when: true

- name: Wait for Docker daemon (via colima) to accept commands
  ansible.builtin.command: docker info
  register: docker_info
  retries: 30
  delay: 5
  until: docker_info.rc == 0
  changed_when: false

- name: List existing kind clusters
  ansible.builtin.command: kind get clusters
  register: kind_clusters
  changed_when: false
  failed_when: false

- name: Create kind cluster {{ kind_cluster_name }}
  ansible.builtin.command: >-
    kind create cluster
    --name {{ kind_cluster_name }}
    --image {{ kind_node_image }}
    --wait 5m
  when: kind_cluster_name not in (kind_clusters.stdout_lines | default([]))
  changed_when: true

- name: Set kubectl context to the kind cluster
  ansible.builtin.command: >-
    kubectl config use-context kind-{{ kind_cluster_name }}
  changed_when: false

- name: Wait for nodes to be Ready
  ansible.builtin.command: >-
    kubectl wait --for=condition=Ready nodes --all --timeout=120s
  changed_when: false
