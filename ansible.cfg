[defaults]
inventory             = inventory/localhost.yml
roles_path            = roles
collections_path      = ./collections:~/.ansible/collections
host_key_checking     = False
nocows                = True
# Use the in-tree default callback (community.general.yaml was
# removed in community.general v12; modern Ansible wants the
# `result_format` knob on ansible.builtin.default instead).
stdout_callback       = ansible.builtin.default
display_skipped_hosts = False
retry_files_enabled   = False
interpreter_python    = auto_silent

[callback_default]
result_format = yaml

[inventory]
enable_plugins = yaml, ini, auto

[ssh_connection]
# We only ever connect to localhost via the local transport; SSH
# settings here are belt-and-suspenders in case someone runs with
# `--connection ssh` against a remote target later.
pipelining = True
