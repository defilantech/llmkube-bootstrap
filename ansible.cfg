[defaults]
inventory             = inventory/localhost.yml
roles_path            = roles
collections_paths     = ./collections:~/.ansible/collections
host_key_checking     = False
nocows                = True
stdout_callback       = yaml
display_skipped_hosts = False
retry_files_enabled   = False
interpreter_python    = auto_silent

[inventory]
enable_plugins = yaml, ini, auto

[ssh_connection]
# We only ever connect to localhost via the local transport; SSH
# settings here are belt-and-suspenders in case someone runs with
# `--connection ssh` against a remote target later.
pipelining = True
